name: vistoria_pdf
description: "A new Flutter project."

publish_to: 'none' # Remove this line if you wish to publish to pub.dev


version: 1.0.0+1

environment:
  sdk: ^3.10.8


dependencies:
  flutter:
    sdk: flutter
  cupertino_icons: ^1.0.8
  flutter_colorpicker: ^1.1.0
  syncfusion_flutter_pdf: ^32.2.3
  syncfusion_flutter_pdfviewer: ^32.2.3
  path_provider: ^2.1.2
  shared_preferences: ^2.2.2
  open_filex: ^4.4.0
  flutter_map: ^8.2.2
  latlong2: ^0.9.1
  flutter_map_dragmarker: ^8.0.3
  http: ^1.2.2
  image: ^4.5.1
  flutter_iconpicker: ^4.0.3
  screenshot: ^3.0.0
  heroicons: ^0.11.0
  uuid: ^4.5.1
  web: ^1.1.1
  google_sign_in: ^7.2.0
  google_sign_in_web: ^1.1.3
  googleapis: ^16.0.0
  extension_google_sign_in_as_googleapis_auth: ^3.0.0
  idb_shim: ^2.8.5+2
  flutter_dotenv: ^5.2.1
  file_picker: ^11.0.2

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^6.0.0
  flutter_launcher_icons: "^0.14.4"

flutter:

  uses-material-design: true

  assets:
    - .env
    - assets/logo.jpg
    - assets/cnpj.jpeg
    - assets/email.jpeg
    - assets/map.jpeg
    - assets/whats.jpeg
    

flutter_launcher_icons:
  android: "launcher_icon"
  ios: true
  image_path: "assets/logo.jpg"
  min_sdk_android: 21 # android min sdk min:16, default 21

  macos:
    generate: true
    image_path: "assets/logo.jpg"